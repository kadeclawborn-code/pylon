name: Lint (Pylon Self-Review)

on:
  pull_request:
    branches: [main]

# Pylon-the-product lints itself with Pylon-the-product on PRs. Yes, this is
# a meta-loop. Yes, it has caught at least three bugs in dogfooding (PYL-237,
# PYL-281, PYL-302). The Pylon webhook for this repo is configured outside CI;
# this workflow just runs ruff and mypy as the explicit baseline.

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.6.9
      - run: ruff check src tests
      - run: ruff format --check src tests

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -e ".[dev]"
          mypy src
